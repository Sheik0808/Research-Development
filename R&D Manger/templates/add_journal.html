{% extends 'base.html' %}

{% block content %}
<div class="container mb-5">
    <h2 class="mb-4">Add Journal Publication</h2>

    <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">

        <!-- ================== 1. AUTHOR DETAILS ================== -->
        <h5 class="text-primary border-bottom pb-2">1. Author Details</h5>

        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">Department</label>
                <select name="department" class="form-select" required>
                    <option>CSE</option><option>ECE</option><option>IT</option>
                    <option>AIDS</option><option>MECH</option><option>CYS</option>
                    <option>CSBS</option><option>AIML</option><option>S&H</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Author Name</label>
                <input type="text" name="author_name" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Author Position</label>
                <select name="author_position" class="form-select">
                    <option>First Author</option>
                    <option>Corresponding Author</option>
                    <option>Co-Author</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Collaborative Authors</label>
                <input type="text" name="collaborative_authors" class="form-control">
            </div>
        </div>

        <!-- ================== 2. JOURNAL DETAILS ================== -->
        <h5 class="text-primary border-bottom pb-2 mt-4">2. Journal Information</h5>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Paper Title</label>
                <input type="text" name="paper_title" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Journal Status</label>
                <select name="journal_status" class="form-select">
                    <option>Published</option>
                    <option>Accepted</option>
                    <option>Submitted</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Journal Scope</label>
                <select name="journal_scope" class="form-select">
                    <option>International</option>
                    <option>National</option>
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">Journal Name</label>
                <input type="text" name="journal_name" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Publisher</label>
                <input type="text" name="publisher" class="form-control">
            </div>

            <div class="col-md-2">
                <label class="form-label">Month / Year</label>
                <input type="text" id="month_year" name="month_year" class="form-control date-picker" placeholder="Select Date" required>
                <small class="text-muted d-block mt-1">Click to select</small>
            </div>

            <div class="col-md-2">
                <label class="form-label">ISSN</label>
                <input type="text" name="issn_number" class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Volume / Issue / Page No</label>
            <input type="text" name="vol_issue_page" class="form-control">
        </div>

        <!-- ================== 3. YEAR & INDEXING (IMPORTANT) ================== -->
        <h5 class="text-primary border-bottom pb-2 mt-4">3. Publication Year & Indexing</h5>

        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">Publication Year</label>
                <input type="text" id="publication_year" name="year" class="form-control year-picker" placeholder="Select Year" required>
                <small class="text-muted d-block mt-1">Click to select</small>
            </div>

            <div class="col-md-4">
                <label class="form-label">Indexing Type</label>
                <select name="indexing" class="form-select" required>
                    <option value="">Select</option>
                    <option value="Scopus">Scopus</option>
                    <option value="WoS">Web of Science</option>
                    <option value="SCI/SCIE/SSCI">SCI / SCIE / SSCI</option>
                    <option value="None">None</option>
                </select>
            </div>
        </div>

        <!-- ================== 4. METRICS ================== -->
        <h5 class="text-primary border-bottom pb-2 mt-4">4. Metrics</h5>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Impact Factor</label>
                <input type="number" step="0.01" name="impact_factor" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">Citation Score</label>
                <input type="number" step="0.01" name="citation_score" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">SJR</label>
                <select name="sjr_rating" class="form-select">
                    <option value="">None</option>
                    <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option>
                </select>
            </div>

            <div class="col">
                <label class="form-label">H-Index</label>
                <input type="number" name="h_index" class="form-control">
            </div>
        </div>

        <!-- ================== 5. LINKS & PROOF ================== -->
        <h5 class="text-primary border-bottom pb-2 mt-4">5. Links & Proof</h5>

        <div class="row mb-3">
            <div class="col-md-4">
                <input type="text" name="preview_link" class="form-control" placeholder="Scopus/WoS Link">
            </div>
            <div class="col-md-4">
                <input type="text" name="home_page_link" class="form-control" placeholder="Journal Home Page">
            </div>
            <div class="col-md-4">
                <input type="text" name="doi_link" class="form-control" placeholder="DOI Link">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Upload Proof</label>
            <input type="file" name="proof" class="form-control">
        </div>

        <button type="submit" class="btn btn-success btn-lg w-100">
            Save Journal Record
        </button>

    </form>
</div>
{% endblock %}
